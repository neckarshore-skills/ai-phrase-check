name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Install bats
        run: |
          sudo apt-get update -y
          sudo apt-get install -y bats

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: |
          cd scripts
          shellcheck -x detect.sh apply.sh lib/parse-phrases.sh

      # parity-test.bats compares the bash detector against the JS detector
      # (cd web && npx tsx ...), so the bats job needs Node + web deps.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20

      - name: Install web deps (for the parity JS side)
        run: npm ci --prefix web

      - name: Run bats tests
        run: |
          bats tests/parse-phrases.bats
          bats tests/detect.bats
          bats tests/apply.bats
          bats tests/parity-test.bats

  cspell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
      - name: Install cspell + DE dictionary
        run: npm install -g cspell@8 @cspell/dict-de-de
      - name: Run cspell
        run: cspell --no-progress "references/**/*.md" "docs/**/*.md" "README.md" "CLAUDE.md"

  web-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Run vitest
        run: npm test
      - name: Audit dependencies (fail on high/critical)
        run: npm audit --audit-level=high
