name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Install bats
        run: |
          sudo apt-get update -y
          sudo apt-get install -y bats

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: |
          cd scripts
          shellcheck -x detect.sh apply.sh lib/parse-phrases.sh

      # parity-test.bats compares the bash detector against the JS detector
      # (cd web && npx tsx ...), so the bats job needs Node + web deps.
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20

      - name: Install web deps (for the parity JS side)
        run: npm ci --prefix web

      - name: Run bats tests
        run: |
          bats tests/parse-phrases.bats
          bats tests/detect.bats
          bats tests/apply.bats
          bats tests/parity-test.bats

  cspell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
      - name: Install cspell + DE dictionary
        run: npm install -g cspell@8 @cspell/dict-de-de
      - name: Run cspell
        run: cspell --no-progress "references/**/*.md" "docs/**/*.md" "README.md" "CLAUDE.md"

  web-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Run vitest
        run: npm test
      - name: Audit dependencies (fail on high/critical)
        run: npm audit --audit-level=high

  # Estate stats.json producer (test-scope facet, backlog #394 / Phase-3 breadth rollout).
  # Publishes a contract-conformant stats.json to the UNPROTECTED `stats-data` branch on every
  # push:main, AFTER the two TEST gates (bats `test` + vitest `web-tests`). Runs even when they fail
  # (if: always) so a non-green run emits red:true — never a stale-green count. contents:write is
  # scoped to THIS job only; publishing to stats-data (not main) keeps main's branch protection fully
  # intact — no bypass actor, no weakened required check. main is public + protected (enforce_admins
  # + required test/cspell/web-tests checks); a bot push to main is correctly rejected, so the machine
  # artifact lives on its own unprotected single-file branch instead (Approach E, trustscope PR #63).
  #
  # Counts come from each runner's OWN reporter (never grep), two disjoint suites summed into unit:
  #   bats   → `bats --count` over the four gated bats files (bash detector)
  #   vitest → `vitest run --reporter=json` .numPassedTests (web/ TS detector)
  # `red` = (bats gate failed OR vitest gate failed). cspell is a docs-lint gate, NOT a test suite,
  # so it is deliberately excluded from both the count and the red determination.
  # Contract: https://github.com/neckarshore-ai/neckarshore-planning/blob/main/docs/reference/stats-json-contract.md
  emit-stats:
    name: Emit stats.json (estate producer)
    needs: [test, web-tests]
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    concurrency:
      # Serialize emits so two rapid pushes cannot race on the git push to stats-data.
      group: emit-stats-${{ github.ref }}
      cancel-in-progress: false
    steps:
      # Default persist-credentials (true) — the publish step pushes stats.json to the UNPROTECTED
      # stats-data branch via the job's contents:write GITHUB_TOKEN (github-actions[bot]).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install bats
        run: |
          sudo apt-get update -y
          sudo apt-get install -y bats

      # `bats --count` tallies @test declarations without executing them — no node/web deps needed
      # for the count. Its bare-integer output is exactly what the action's bats handler reads.
      - name: Capture bats reporter (bats --count)
        run: bats --count tests/parse-phrases.bats tests/detect.bats tests/apply.bats tests/parity-test.bats > /tmp/bats.count

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20

      - name: Install web deps
        run: npm ci --prefix web

      # vitest json reporter → top-level .numPassedTests (jest-compatible), read by the action.
      - name: Capture vitest reporter (json)
        working-directory: web
        run: npx vitest run --reporter=json --outputFile=/tmp/vitest.json || true

      # Pass/fail comes from the two TEST gate results (never the docs-lint cspell gate, never
      # untrusted event text — no injection surface).
      - name: Compute combined test result
        id: result
        env:
          BATS_RESULT: ${{ needs.test.result }}
          VITEST_RESULT: ${{ needs.web-tests.result }}
        run: |
          if [ "$BATS_RESULT" = "success" ] && [ "$VITEST_RESULT" = "success" ]; then
            echo "value=success" >> "$GITHUB_OUTPUT"
            echo "detail=" >> "$GITHUB_OUTPUT"
          else
            detail=""
            [ "$BATS_RESULT" != "success" ] && detail="bats suite: $BATS_RESULT"
            [ "$VITEST_RESULT" != "success" ] && detail="${detail:+$detail; }vitest suite: $VITEST_RESULT"
            echo "value=failure" >> "$GITHUB_OUTPUT"
            echo "detail=$detail" >> "$GITHUB_OUTPUT"
          fi

      # SHA-pinned (third-party actions are never tag-floated). 54ae407 is the PIR-passed pin.
      - name: Emit stats.json
        uses: neckarshore-ai/test-stats-action@54ae407769bdfea6b8fed2672f0ceefa5ef2588a
        with:
          repo: ${{ github.repository }}
          out: stats.json
          sha: ${{ github.sha }}
          test_result: ${{ steps.result.outputs.value }}
          red_detail: ${{ steps.result.outputs.detail }}
          runners: |
            unit:bats:/tmp/bats.count
            unit:vitest:/tmp/vitest.json

      # Structural contract gate — invariants that hold on BOTH green and red runs. Deliberately
      # does NOT assert a golden total (a red run legitimately undercounts and must still emit red:true).
      - name: Validate emitted stats.json against the contract
        run: |
          jq -e --arg repo "$GITHUB_REPOSITORY" '
            .repo == $repo
            and (.audited_sha | type == "string" and length > 0)
            and (.tests.total == ([.tests.byType[]] | add))
            and (.tests.byType | has("unit"))
            and (.red | type == "boolean")
          ' stats.json > /dev/null \
            || { echo "::error::stats.json failed contract validation"; cat stats.json; exit 1; }
          echo "stats.json is contract-valid:"; cat stats.json

      # Publish to the UNPROTECTED stats-data branch via git PLUMBING (hash-object → mktree →
      # commit-tree → push), NOT a working-tree checkout. stats-data is an orphan single-file branch
      # sharing no history with main, so `git checkout stats-data` would abort. Plumbing writes one
      # blob + one tree + one commit and pushes the ref, never switching branches. The orphan branch
      # carries NO workflow files, so a push to it triggers no CI — the re-emit loop is structurally
      # impossible. Diff-guard on everything except updatedAt so a same-sha re-run causes no churn.
      - name: Publish stats.json to the stats-data branch when it changed
        env:
          GIT_AUTHOR_NAME: "github-actions[bot]"
          GIT_AUTHOR_EMAIL: "github-actions[bot]@users.noreply.github.com"
          GIT_COMMITTER_NAME: "github-actions[bot]"
          GIT_COMMITTER_EMAIL: "github-actions[bot]@users.noreply.github.com"
        run: |
          set -euo pipefail
          norm() { jq -S 'del(.updatedAt)' "$1" 2>/dev/null; }
          git fetch origin +refs/heads/stats-data:refs/remotes/origin/stats-data 2>/dev/null || true
          if git show origin/stats-data:stats.json > /tmp/prev-stats.json 2>/dev/null \
             && [ "$(norm /tmp/prev-stats.json)" = "$(norm stats.json)" ]; then
            echo "stats.json unchanged (ignoring timestamp) — nothing to publish."
            exit 0
          fi
          BLOB=$(git hash-object -w stats.json)
          TREE=$(printf '100644 blob %s\tstats.json\n' "$BLOB" | git mktree)
          MSG="chore(stats): emit stats.json @ ${GITHUB_SHA:0:7}"
          if git rev-parse --verify origin/stats-data >/dev/null 2>&1; then
            COMMIT=$(git commit-tree "$TREE" -p origin/stats-data -m "$MSG")
          else
            COMMIT=$(git commit-tree "$TREE" -m "$MSG")
          fi
          # Belt: an empty source refspec (":refs/heads/stats-data") is a DELETE, not a no-op — an
          # empty $COMMIT would delete stats-data. set -e already aborts on a failed commit-tree; this
          # is the explicit guard so a branch deletion can never depend on implicit -e.
          [ -n "$COMMIT" ] || { echo "::error::commit-tree produced no commit — refusing to push (would delete stats-data)"; exit 1; }
          git push origin "${COMMIT}:refs/heads/stats-data"
